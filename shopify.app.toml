# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "b6bca77be79e4fed3d17e63886c9c082"
name = "UNDR Customer Report"
application_url = "https://undr-customer-report-app-two.vercel.app/"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"
  
  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/created"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_orders,write_app_proxy,write_orders,read_products"

[auth]
redirect_urls = [ "https://undr-customer-report-app-two.vercel.app/api/auth" ]

[app_proxy]
url = "https://undr-customer-report-app-two.vercel.app/proxy/undr"
subpath = "undr"
prefix = "apps"
